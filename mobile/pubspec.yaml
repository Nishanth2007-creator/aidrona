name: aidrona
description: AiDrona - Emergency Health Coordination Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0
  firebase_messaging: ^15.0.0
  firebase_storage: ^12.1.0

  # Google Services
  google_maps_flutter: ^2.7.0
  google_sign_in: ^6.2.1
  speech_to_text: ^6.6.2

  # QR
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.0

  # State & Navigation
  provider: ^6.1.2
  go_router: ^14.1.0

  # UI
  fl_chart: ^0.68.0
  shimmer: ^3.0.0
  lottie: ^3.1.0
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2
  file_picker: ^8.0.7
  permission_handler: ^11.3.1
  contacts_service: ^0.6.3

  # Utils
  http: ^1.2.1
  intl: ^0.19.0
  uuid: ^4.4.0
  shared_preferences: ^2.3.0
  geolocator: ^11.1.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
  generate: true
